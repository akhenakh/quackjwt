name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go vet ./...
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: ko-build/setup-ko@v0.9

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Create zig cc wrapper
        run: |
          cat > /usr/local/bin/zig-cc <<'SCRIPT'
          #!/bin/bash
          case "${GOARCH}" in
            arm64) exec zig cc -target aarch64-linux-gnu "$@" ;;
            *)     exec zig cc -target x86_64-linux-gnu "$@" ;;
          esac
          SCRIPT
          chmod +x /usr/local/bin/zig-cc

          cat > /usr/local/bin/zig-cxx <<'SCRIPT'
          #!/bin/bash
          case "${GOARCH}" in
            arm64) exec zig c++ -target aarch64-linux-gnu "$@" ;;
            *)     exec zig c++ -target x86_64-linux-gnu "$@" ;;
          esac
          SCRIPT
          chmod +x /usr/local/bin/zig-cxx

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push oauth-server image with ko
        env:
          KO_DOCKER_REPO: ghcr.io/akhenakh/quackjwt
          CC: /usr/local/bin/zig-cc
          CXX: /usr/local/bin/zig-cxx
        run: |
          TAGS="--tags ${{ github.ref_name }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="$TAGS --tags latest"
          fi
          ko build --bare $TAGS \
            --platform=linux/amd64,linux/arm64 \
            ./cmd/oauth-server
